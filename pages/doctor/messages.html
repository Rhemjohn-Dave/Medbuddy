<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - MedBuddy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="../../assets/css/style.css" rel="stylesheet">
</head>
<body>
    <div class="wrapper">
        <!-- Sidebar -->
        <nav id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <h3>MedBuddy</h3>
            </div>
            <div id="sidebarContent"></div>
        </nav>

        <!-- Page Content -->
        <div id="content">
            <!-- Navbar -->
            <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
                <div class="container-fluid">
                    <button type="button" id="sidebarCollapse" class="btn btn-link">
                        <span class="material-icons">menu</span>
                    </button>
                    <span class="navbar-brand mb-0 h1">Messages</span>
                    <div class="ms-auto">
                        <div class="dropdown">
                            <button class="btn btn-link dropdown-toggle text-dark" type="button" id="userDropdown" data-bs-toggle="dropdown">
                                <span id="userName">Dr. John Doe</span>
                            </button>
                            <ul class="dropdown-menu dropdown-menu-end">
                                <li><a class="dropdown-item" href="profile.html">Profile</a></li>
                                <li><a class="dropdown-item" href="#">Settings</a></li>
                                <li><a class="dropdown-item" href="#">Notifications</a></li>
                                <li><hr class="dropdown-divider"></li>
                                <li><a class="dropdown-item text-danger" href="#" id="logoutBtn">Logout</a></li>
                            </ul>
                        </div>
                    </div>
                </div>
            </nav>

            <!-- Main Content -->
            <div class="container-fluid py-4">
                <div class="row">
                    <!-- Conversations List -->
                    <div class="col-md-4">
                        <div class="card">
                            <div class="card-header d-flex justify-content-between align-items-center">
                                <h5 class="card-title mb-0">Conversations</h5>
                                <button class="btn btn-primary" id="newMessage">
                                    <span class="material-icons align-text-bottom me-1">edit</span>
                                    New Message
                                </button>
                            </div>
                            <div class="card-body p-0">
                                <div class="input-group p-3 border-bottom">
                                    <span class="input-group-text bg-white border-end-0">
                                        <span class="material-icons">search</span>
                                    </span>
                                    <input type="text" class="form-control border-start-0" id="searchConversations" placeholder="Search conversations...">
                                </div>
                                <div class="list-group list-group-flush" id="conversationsList">
                                    <!-- Conversations will be loaded here -->
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Message Detail -->
                    <div class="col-md-8">
                        <div class="card">
                            <div class="card-header d-flex justify-content-between align-items-center">
                                <div>
                                    <h5 class="card-title mb-0" id="conversationTitle">Select a conversation</h5>
                                    <small class="text-muted" id="conversationStatus"></small>
                                </div>
                                <div class="btn-group">
                                    <button class="btn btn-outline-primary" id="viewPatientProfile">
                                        <span class="material-icons align-text-bottom">person</span>
                                    </button>
                                    <button class="btn btn-outline-primary" id="viewAppointments">
                                        <span class="material-icons align-text-bottom">event</span>
                                    </button>
                                </div>
                            </div>
                            <div class="card-body p-0">
                                <div class="messages-container" id="messagesContainer" style="height: 400px; overflow-y: auto;">
                                    <!-- Messages will be loaded here -->
                                </div>
                                <div class="p-3 border-top">
                                    <form id="messageForm" class="d-none">
                                        <div class="input-group">
                                            <textarea class="form-control" id="messageInput" rows="1" placeholder="Type your message..."></textarea>
                                            <button class="btn btn-primary" type="submit">
                                                <span class="material-icons">send</span>
                                            </button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- New Message Modal -->
    <div class="modal fade" id="newMessageModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">New Message</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="newMessageForm">
                        <div class="mb-3">
                            <label class="form-label">To</label>
                            <select class="form-select" id="messageRecipient" required>
                                <option value="">Select Patient</option>
                                <!-- Patient options will be loaded here -->
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Subject</label>
                            <input type="text" class="form-control" id="messageSubject" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Message</label>
                            <textarea class="form-control" id="messageBody" rows="5" required></textarea>
                        </div>
                        <div class="mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="urgentMessage">
                                <label class="form-check-label" for="urgentMessage">
                                    Mark as Urgent
                                </label>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="sendNewMessage">Send Message</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../assets/js/common.js"></script>
    <script src="../../assets/js/doctor.js"></script>
    <script src="../../assets/js/messages.js"></script>
</body>
</html>
