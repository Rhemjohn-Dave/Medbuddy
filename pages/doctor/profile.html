<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Profile - MedBuddy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="../../assets/css/style.css" rel="stylesheet">
</head>
<body>
    <div class="wrapper">
        <!-- Sidebar -->
        <nav id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <h3>MedBuddy</h3>
            </div>
            <div id="sidebarContent"></div>
        </nav>

        <!-- Page Content -->
        <div id="content">
            <!-- Navbar -->
            <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
                <div class="container-fluid">
                    <button type="button" id="sidebarCollapse" class="btn btn-link">
                        <span class="material-icons">menu</span>
                    </button>
                    <span class="navbar-brand mb-0 h1">Doctor Profile</span>
                    <div class="ms-auto">
                        <div class="dropdown">
                            <button class="btn btn-link dropdown-toggle text-dark" type="button" id="userDropdown" data-bs-toggle="dropdown">
                                <span id="userName">Dr. John Doe</span>
                            </button>
                            <ul class="dropdown-menu dropdown-menu-end">
                                <li><a class="dropdown-item" href="profile.html">Profile</a></li>
                                <li><a class="dropdown-item" href="#">Settings</a></li>
                                <li><a class="dropdown-item" href="#">Notifications</a></li>
                                <li><hr class="dropdown-divider"></li>
                                <li><a class="dropdown-item text-danger" href="#" id="logoutBtn">Logout</a></li>
                            </ul>
                        </div>
                    </div>
                </div>
            </nav>

            <!-- Main Content -->
            <div class="container-fluid py-4">
                <div class="row">
                    <!-- Profile Overview -->
                    <div class="col-md-4 mb-4">
                        <div class="card">
                            <div class="card-body text-center">
                                <div class="mb-3">
                                    <img src="D:\Xampp\htdocs\Medbuddy\assets\images\avatars\doctor-avatar.jpg" alt="Profile Photo" class="rounded-circle" style="width: 150px; height: 150px; object-fit: cover;">
                                </div>
                                <h4 class="card-title mb-1" id="doctorName">Dr. John Doe</h4>
                                <p class="text-muted mb-3" id="doctorSpecialization">Cardiology Specialist</p>
                                <button class="btn btn-primary" id="editProfileBtn">
                                    <span class="material-icons align-text-bottom me-1">edit</span>
                                    Edit Profile
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Profile Details -->
                    <div class="col-md-8">
                        <div class="card">
                            <div class="card-body">
                                <ul class="nav nav-tabs" id="profileTabs" role="tablist">
                                    <li class="nav-item">
                                        <a class="nav-link active" id="personal-tab" data-bs-toggle="tab" href="#personal" role="tab">Personal Information</a>
                                    </li>
                                    <li class="nav-item">
                                        <a class="nav-link" id="clinic-tab" data-bs-toggle="tab" href="#clinic" role="tab">Clinic Details</a>
                                    </li>
                                    <li class="nav-item">
                                        <a class="nav-link" id="professional-tab" data-bs-toggle="tab" href="#professional" role="tab">Professional Information</a>
                                    </li>
                                </ul>

                                <div class="tab-content mt-3" id="profileTabContent">
                                    <!-- Personal Information -->
                                    <div class="tab-pane fade show active" id="personal" role="tabpanel">
                                        <form id="personalInfoForm">
                                            <div class="row mb-3">
                                                <div class="col-md-6">
                                                    <label class="form-label">First Name</label>
                                                    <input type="text" class="form-control" id="firstName" readonly>
                                                </div>
                                                <div class="col-md-6">
                                                    <label class="form-label">Last Name</label>
                                                    <input type="text" class="form-control" id="lastName" readonly>
                                                </div>
                                            </div>
                                            <div class="row mb-3">
                                                <div class="col-md-6">
                                                    <label class="form-label">Email</label>
                                                    <input type="email" class="form-control" id="email" readonly>
                                                </div>
                                                <div class="col-md-6">
                                                    <label class="form-label">Phone</label>
                                                    <input type="tel" class="form-control" id="phone" readonly>
                                                </div>
                                            </div>
                                            <div class="row mb-3">
                                                <div class="col-md-6">
                                                    <label class="form-label">Date of Birth</label>
                                                    <input type="date" class="form-control" id="dob" readonly>
                                                </div>
                                                <div class="col-md-6">
                                                    <label class="form-label">Gender</label>
                                                    <select class="form-select" id="gender" disabled>
                                                        <option value="">Select Gender</option>
                                                        <option value="male">Male</option>
                                                        <option value="female">Female</option>
                                                        <option value="other">Other</option>
                                                    </select>
                                                </div>
                                            </div>
                                            <div class="text-end">
                                                <button type="button" class="btn btn-outline-primary" id="editPersonalBtn">
                                                    <span class="material-icons align-text-bottom me-1">edit</span>
                                                    Edit
                                                </button>
                                                <button type="submit" class="btn btn-primary d-none" id="savePersonalBtn">
                                                    <span class="material-icons align-text-bottom me-1">save</span>
                                                    Save Changes
                                                </button>
                                            </div>
                                        </form>
                                    </div>

                                    <!-- Clinic Details -->
                                    <div class="tab-pane fade" id="clinic" role="tabpanel">
                                        <form id="clinicInfoForm">
                                            <div class="row mb-3">
                                                <div class="col-md-6">
                                                    <label class="form-label">Clinic Name</label>
                                                    <input type="text" class="form-control" id="clinicName" readonly>
                                                </div>
                                                <div class="col-md-6">
                                                    <label class="form-label">Clinic Address</label>
                                                    <input type="text" class="form-control" id="clinicAddress" readonly>
                                                </div>
                                            </div>
                                            <div class="row mb-3">
                                                <div class="col-md-6">
                                                    <label class="form-label">Clinic Phone</label>
                                                    <input type="tel" class="form-control" id="clinicPhone" readonly>
                                                </div>
                                                <div class="col-md-6">
                                                    <label class="form-label">Clinic Email</label>
                                                    <input type="email" class="form-control" id="clinicEmail" readonly>
                                                </div>
                                            </div>
                                            <div class="row mb-3">
                                                <div class="col-md-6">
                                                    <label class="form-label">Clinic Hours</label>
                                                    <input type="text" class="form-control" id="clinicHours" readonly>
                                                </div>
                                                <div class="col-md-6">
                                                    <label class="form-label">Consultation Fee</label>
                                                    <div class="input-group">
                                                        <span class="input-group-text">$</span>
                                                        <input type="number" class="form-control" id="consultationFee" readonly>
                                                    </div>
                                                </div>
                                            </div>
                                            <div class="text-end">
                                                <button type="button" class="btn btn-outline-primary" id="editClinicBtn">
                                                    <span class="material-icons align-text-bottom me-1">edit</span>
                                                    Edit
                                                </button>
                                                <button type="submit" class="btn btn-primary d-none" id="saveClinicBtn">
                                                    <span class="material-icons align-text-bottom me-1">save</span>
                                                    Save Changes
                                                </button>
                                            </div>
                                        </form>
                                    </div>

                                    <!-- Professional Information -->
                                    <div class="tab-pane fade" id="professional" role="tabpanel">
                                        <form id="professionalInfoForm">
                                            <div class="row mb-3">
                                                <div class="col-md-6">
                                                    <label class="form-label">Specialization</label>
                                                    <input type="text" class="form-control" id="specialization" readonly>
                                                </div>
                                                <div class="col-md-6">
                                                    <label class="form-label">License Number</label>
                                                    <input type="text" class="form-control" id="licenseNumber" readonly>
                                                </div>
                                            </div>
                                            <div class="row mb-3">
                                                <div class="col-md-6">
                                                    <label class="form-label">Years of Experience</label>
                                                    <input type="number" class="form-control" id="experience" readonly>
                                                </div>
                                                <div class="col-md-6">
                                                    <label class="form-label">Board Certification</label>
                                                    <input type="text" class="form-control" id="boardCertification" readonly>
                                                </div>
                                            </div>
                                            <div class="mb-3">
                                                <label class="form-label">Education</label>
                                                <textarea class="form-control" id="education" rows="3" readonly></textarea>
                                            </div>
                                            <div class="mb-3">
                                                <label class="form-label">Professional Memberships</label>
                                                <textarea class="form-control" id="memberships" rows="2" readonly></textarea>
                                            </div>
                                            <div class="text-end">
                                                <button type="button" class="btn btn-outline-primary" id="editProfessionalBtn">
                                                    <span class="material-icons align-text-bottom me-1">edit</span>
                                                    Edit
                                                </button>
                                                <button type="submit" class="btn btn-primary d-none" id="saveProfessionalBtn">
                                                    <span class="material-icons align-text-bottom me-1">save</span>
                                                    Save Changes
                                                </button>
                                            </div>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../assets/js/common.js"></script>
    <script src="../../assets/js/doctor.js"></script>
    <script src="../../assets/js/profile.js"></script>
</body>
</html>
