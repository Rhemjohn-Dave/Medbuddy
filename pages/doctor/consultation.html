<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Consultation - MedBuddy</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Material icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <!-- Google Fonts - Roboto -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="../../assets/css/style.css" rel="stylesheet">
</head>
<body>
    <div class="wrapper">
        <!-- Sidebar -->
        <nav id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <h3>MedBuddy</h3>
            </div>
            <div id="sidebarContent"></div>
        </nav>

        <!-- Page Content -->
        <div id="content">
            <!-- Navbar -->
            <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
                <div class="container-fluid">
                    <button type="button" id="sidebarCollapse" class="btn btn-link">
                        <span class="material-icons">menu</span>
                    </button>
                    <span class="navbar-brand mb-0 h1">Patient Consultation</span>
                    <div class="ms-auto">
                        <div class="dropdown">
                            <button class="btn btn-link dropdown-toggle text-dark" type="button" id="userDropdown" data-bs-toggle="dropdown">
                                <span id="userName">Dr. Sarah Johnson</span>
                            </button>
                            <ul class="dropdown-menu dropdown-menu-end">
                                <li><a class="dropdown-item" href="profile.html">Profile</a></li>
                                <li><a class="dropdown-item" href="#">Settings</a></li>
                                <li><a class="dropdown-item" href="#">Notifications</a></li>
                                <li><hr class="dropdown-divider"></li>
                                <li><a class="dropdown-item text-danger" href="#" id="logoutBtn">Logout</a></li>
                            </ul>
                        </div>
                    </div>
                </div>
            </nav>
                
            <!-- Consultation Content -->
            <div class="container-fluid py-4">
                <!-- Patient Information Card -->
                <div class="row mb-4">
                    <div class="col-12">
                        <div class="card">
                            <div class="card-body">
                                <div class="d-flex flex-wrap align-items-center">
                                    <div class="avatar rounded-circle bg-primary text-white d-flex align-items-center justify-content-center me-3" style="width: 60px; height: 60px; font-size: 1.5rem;">
                                        <span id="patientInitials">JS</span>
                                    </div>
                                    <div class="me-auto">
                                        <h4 class="mb-0" id="patientName">John Smith</h4>
                                        <p class="text-muted mb-0" id="patientDemographics">Male, 45 years (DOB: 15/05/1978)</p>
                                        <p class="text-muted mb-0" id="patientId">ID: P12345</p>
                                    </div>
                                    <div class="d-flex flex-column flex-md-row mt-3 mt-md-0">
                                        <button class="btn btn-outline-primary me-md-2 mb-2 mb-md-0" id="viewPatientHistoryBtn">
                                            <span class="material-icons align-middle me-1">history</span> Medical History
                                        </button>
                                        <button class="btn btn-outline-danger" id="backToAppointmentsBtn">
                                            <span class="material-icons align-middle me-1">arrow_back</span> Back to Appointments
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Consultation Form -->
                <div class="row">
                    <!-- Left Column -->
                    <div class="col-md-6 mb-4">
                        <div class="card mb-4">
                            <div class="card-header">
                                <h5 class="mb-0">Appointment Information</h5>
                            </div>
                            <div class="card-body">
                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <label for="consultationDate" class="form-label">Date</label>
                                        <input type="date" class="form-control" id="consultationDate" value="" readonly>
                                    </div>
                                    <div class="col-md-6">
                                        <label for="consultationTime" class="form-label">Time</label>
                                        <input type="time" class="form-control" id="consultationTime" value="" readonly>
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label for="appointmentType" class="form-label">Appointment Type</label>
                                    <select class="form-select" id="appointmentType">
                                        <option value="followup">Follow-up</option>
                                        <option value="newpatient">New Patient</option>
                                        <option value="annual">Annual Check-up</option>
                                        <option value="urgent">Urgent Care</option>
                                        <option value="labresults">Lab Results Review</option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label for="chiefComplaint" class="form-label">Chief Complaint</label>
                                    <input type="text" class="form-control" id="chiefComplaint" placeholder="Primary reason for visit">
                                </div>
                            </div>
                        </div>
                        
                        <div class="card mb-4">
                            <div class="card-header">
                                <h5 class="mb-0">Vital Signs</h5>
                            </div>
                            <div class="card-body">
                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <label for="bloodPressure" class="form-label">Blood Pressure (mmHg)</label>
                                        <input type="text" class="form-control" id="bloodPressure" placeholder="e.g., 120/80">
                                    </div>
                                    <div class="col-md-6">
                                        <label for="heartRate" class="form-label">Heart Rate (bpm)</label>
                                        <input type="number" class="form-control" id="heartRate" placeholder="e.g., 72">
                                    </div>
                                </div>
                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <label for="temperature" class="form-label">Temperature (°F)</label>
                                        <input type="number" class="form-control" id="temperature" placeholder="e.g., 98.6" step="0.1">
                                    </div>
                                    <div class="col-md-6">
                                        <label for="respiratoryRate" class="form-label">Respiratory Rate</label>
                                        <input type="number" class="form-control" id="respiratoryRate" placeholder="e.g., 16">
                                    </div>
                                </div>
                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <label for="height" class="form-label">Height (in)</label>
                                        <input type="number" class="form-control" id="height" placeholder="e.g., 70" step="0.1">
                                    </div>
                                    <div class="col-md-6">
                                        <label for="weight" class="form-label">Weight (lbs)</label>
                                        <input type="number" class="form-control" id="weight" placeholder="e.g., 160" step="0.1">
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label for="bmi" class="form-label">BMI</label>
                                    <input type="number" class="form-control" id="bmi" placeholder="BMI will be calculated" readonly>
                                </div>
                                <div class="mb-3">
                                    <label for="painLevel" class="form-label">Pain Level (0-10)</label>
                                    <input type="range" class="form-range" min="0" max="10" id="painLevel">
                                    <div class="d-flex justify-content-between">
                                        <span>0 (No Pain)</span>
                                        <span id="painLevelValue">0</span>
                                        <span>10 (Severe)</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="card mb-4">
                            <div class="card-header">
                                <h5 class="mb-0">Patient History</h5>
                            </div>
                            <div class="card-body">
                                <div class="mb-3">
                                    <label for="symptoms" class="form-label">Symptoms & History of Present Illness</label>
                                    <textarea class="form-control" id="symptoms" rows="4" placeholder="Describe symptoms, onset, duration, severity, etc."></textarea>
                                </div>
                                <div class="mb-3">
                                    <label for="allergies" class="form-label">Allergies</label>
                                    <textarea class="form-control" id="allergies" rows="2" placeholder="List any known allergies"></textarea>
                                </div>
                                <div class="mb-3">
                                    <label for="medications" class="form-label">Current Medications</label>
                                    <textarea class="form-control" id="medications" rows="3" placeholder="List current medications, dosage, frequency"></textarea>
                                </div>
                                <div class="mb-3">
                                    <label for="pastHistory" class="form-label">Past Medical History</label>
                                    <textarea class="form-control" id="pastHistory" rows="3" placeholder="Previous diagnoses, hospitalizations, surgeries"></textarea>
                                </div>
                                <div class="mb-3">
                                    <label for="familyHistory" class="form-label">Family History</label>
                                    <textarea class="form-control" id="familyHistory" rows="2" placeholder="Relevant family medical history"></textarea>
                                </div>
                                <div class="mb-3">
                                    <label for="socialHistory" class="form-label">Social History</label>
                                    <textarea class="form-control" id="socialHistory" rows="2" placeholder="Smoking, alcohol, occupation, living situation"></textarea>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Right Column -->
                    <div class="col-md-6 mb-4">
                        <div class="card mb-4">
                            <div class="card-header">
                                <h5 class="mb-0">Physical Examination</h5>
                            </div>
                            <div class="card-body">
                                <div class="mb-3">
                                    <label for="generalAppearance" class="form-label">General Appearance</label>
                                    <textarea class="form-control" id="generalAppearance" rows="2" placeholder="Overall physical appearance"></textarea>
                                </div>
                                <div class="mb-3">
                                    <label for="heent" class="form-label">HEENT (Head, Eyes, Ears, Nose, Throat)</label>
                                    <textarea class="form-control" id="heent" rows="2" placeholder="HEENT findings"></textarea>
                                </div>
                                <div class="mb-3">
                                    <label for="cardiovascular" class="form-label">Cardiovascular</label>
                                    <textarea class="form-control" id="cardiovascular" rows="2" placeholder="Cardiovascular findings"></textarea>
                                </div>
                                <div class="mb-3">
                                    <label for="respiratory" class="form-label">Respiratory</label>
                                    <textarea class="form-control" id="respiratory" rows="2" placeholder="Respiratory findings"></textarea>
                                </div>
                                <div class="mb-3">
                                    <label for="gastrointestinal" class="form-label">Gastrointestinal</label>
                                    <textarea class="form-control" id="gastrointestinal" rows="2" placeholder="Gastrointestinal findings"></textarea>
                                </div>
                                <div class="mb-3">
                                    <label for="musculoskeletal" class="form-label">Musculoskeletal</label>
                                    <textarea class="form-control" id="musculoskeletal" rows="2" placeholder="Musculoskeletal findings"></textarea>
                                </div>
                                <div class="mb-3">
                                    <label for="skin" class="form-label">Skin</label>
                                    <textarea class="form-control" id="skin" rows="2" placeholder="Skin findings"></textarea>
                                </div>
                                <div class="mb-3">
                                    <label for="neurological" class="form-label">Neurological</label>
                                    <textarea class="form-control" id="neurological" rows="2" placeholder="Neurological findings"></textarea>
                                </div>
                                <div class="mb-3">
                                    <label for="additionalFindings" class="form-label">Additional Findings</label>
                                    <textarea class="form-control" id="additionalFindings" rows="2" placeholder="Any other relevant findings"></textarea>
                                </div>
                            </div>
                        </div>
                        
                        <div class="card mb-4">
                            <div class="card-header">
                                <h5 class="mb-0">Assessment & Plan</h5>
                            </div>
                            <div class="card-body">
                                <div class="mb-3">
                                    <label for="diagnosis" class="form-label">Diagnosis</label>
                                    <textarea class="form-control" id="diagnosis" rows="3" placeholder="Primary and secondary diagnoses"></textarea>
                                </div>
                                <div class="mb-3">
                                    <label for="diagnosticTests" class="form-label">Diagnostic Tests Ordered</label>
                                    <textarea class="form-control" id="diagnosticTests" rows="2" placeholder="Tests ordered during this visit"></textarea>
                                </div>
                                <div class="mb-3">
                                    <label for="treatmentPlan" class="form-label">Treatment Plan</label>
                                    <textarea class="form-control" id="treatmentPlan" rows="3" placeholder="Detailed treatment plan"></textarea>
                                </div>
                                <div class="mb-3">
                                    <label for="prescriptions" class="form-label">Prescriptions</label>
                                    <div id="prescriptionsList">
                                        <div class="prescription-item mb-2">
                                            <div class="input-group">
                                                <input type="text" class="form-control prescription-med" placeholder="Medication name">
                                                <input type="text" class="form-control prescription-dosage" placeholder="Dosage">
                                                <input type="text" class="form-control prescription-sig" placeholder="Sig">
                                                <input type="number" class="form-control prescription-quantity" placeholder="Qty" min="1">
                                                <input type="number" class="form-control prescription-refills" placeholder="Refills" min="0">
                                                <button class="btn btn-outline-danger remove-prescription">
                                                    <span class="material-icons">remove</span>
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                    <button class="btn btn-outline-primary mt-2" id="addPrescriptionBtn">
                                        <span class="material-icons align-middle me-1">add</span> Add Prescription
                                    </button>
                                </div>
                                <div class="mb-3">
                                    <label for="patientEducation" class="form-label">Patient Education</label>
                                    <textarea class="form-control" id="patientEducation" rows="2" placeholder="Education provided to patient"></textarea>
                                </div>
                                <div class="mb-3">
                                    <label for="followupPlan" class="form-label">Follow-up Plan</label>
                                    <div class="row g-2">
                                        <div class="col-md-6">
                                            <select class="form-select" id="followupInterval">
                                                <option value="">Select interval</option>
                                                <option value="1week">1 week</option>
                                                <option value="2weeks">2 weeks</option>
                                                <option value="1month">1 month</option>
                                                <option value="3months">3 months</option>
                                                <option value="6months">6 months</option>
                                                <option value="1year">1 year</option>
                                                <option value="prn">As needed</option>
                                                <option value="custom">Custom</option>
                                            </select>
                                        </div>
                                        <div class="col-md-6">
                                            <input type="text" class="form-control" id="followupNotes" placeholder="Additional notes">
                                        </div>
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label for="referrals" class="form-label">Referrals</label>
                                    <textarea class="form-control" id="referrals" rows="2" placeholder="Specialist referrals if needed"></textarea>
                                </div>
                                <div class="mb-3">
                                    <label for="providerNotes" class="form-label">Provider Notes (not visible to patient)</label>
                                    <textarea class="form-control" id="providerNotes" rows="2" placeholder="Private notes for healthcare providers only"></textarea>
                                </div>
                            </div>
                        </div>
                        
                        <div class="card mb-4">
                            <div class="card-header">
                                <h5 class="mb-0">Complete Consultation</h5>
                            </div>
                            <div class="card-body">
                                <div class="mb-3">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="sendToPatientCheck" checked>
                                        <label class="form-check-label" for="sendToPatientCheck">
                                            Send visit summary to patient
                                        </label>
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="scheduleFollowupCheck">
                                        <label class="form-check-label" for="scheduleFollowupCheck">
                                            Schedule follow-up appointment now
                                        </label>
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="billingCheck" checked>
                                        <label class="form-check-label" for="billingCheck">
                                            Submit for billing
                                        </label>
                                    </div>
                                </div>
                                <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                    <button class="btn btn-secondary me-md-2" id="saveConsultationButton">
                                        <span class="material-icons align-middle me-1">save</span> Save as Draft
                                    </button>
                                    <button class="btn btn-primary" id="completeConsultationButton">
                                        <span class="material-icons align-middle me-1">check_circle</span> Complete Consultation
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Common JS -->
    <script src="../../assets/js/common.js"></script>
    <!-- Doctor specific JS -->
    <script src="../../assets/js/doctor.js"></script>
    <!-- Consultation JS -->
    <script src="../../assets/js/consultation.js"></script>
</body>
</html>
